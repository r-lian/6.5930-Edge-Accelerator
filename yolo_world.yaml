# YOLO-World-S workload for AccelForge mapping
#
# Architecture: YOLO-World-S (640x640 input, CVPR 2024 small variant)
#   Backbone:    YOLOv8-S CSPDarknet (P3=80x80x128, P4=40x40x256, P5=20x20x512)
#   Text enc:    CLIP-style transformer (77 tokens, 512-dim, 1 layer modelled)
#   Fusion:      RepVL-PAN cross-modal 1x1 projection at P5 scale
#   Head:        3x3 detection convs at P3 and P4
#
# Layer index map:
#   T0          -- SANITY CHECK: tiny 3x3 conv (8x8x4 -> 8x8x8)
#                  Run with max_layers=1 to validate setup end-to-end.
#                  Expected MACs = 8*8*4*8*3*3 = 18,432
#   T1  - T12   -- Backbone (stem, stride-2 convs, C2f bottlenecks, SPPF)
#   T13 - T17   -- Text encoder (Q/K/V projections, FFN up/down)
#   T18         -- Cross-modal fusion (RepVL-PAN 1x1 at P5)
#   T19 - T20   -- Detection head convs (P3, P4)
#
# Modelling notes:
#   - C2f blocks are approximated as their inner bottleneck 3x3 convs.
#     The 1x1 split/merge projections are cheap and omitted for clarity.
#   - SPPF max-pool branches have no weights; only the 1x1 reduction is modelled.
#   - Text encoder QK^T attention score matmul is omitted; at 77 tokens it is
#     negligible relative to the spatial backbone ops.
#   - RepVL-PAN upsample convs omitted; cross-modal 1x1 fusion at P5 included.
#   - Batch norm, activations, and upsample ops carry no MAC cost in AccelForge.
#   - All tensors use 8-bit quantization (bits_per_value: {All: 8}).
#   - 1x1 convs use the pointwise einsum form I[n, c, p, q] (no H:/W: accessor).

renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1

workload:
  bits_per_value: {All: 8}
  rank_sizes: {N: {{BATCH_SIZE}}}

  einsums:

  # ── Sanity check ──────────────────────────────────────────────────────────
  # T0: tiny 3x3 conv  8x8x4 -> 8x8x8
  #   Expected MACs = 8 * 8 * 4 * 8 * 3 * 3 = 18,432
  #   Use run_dnn_layers(..., max_layers=1) to run this alone first.
  - einsum: "T0[p0, q0, n, m0] = I0[n, c0, H: p0 + r0, W: q0 + s0] * W0[r0, s0, c0, m0]"
    iteration_space_shape:
    - 0 <= p0 < 8
    - 0 <= q0 < 8
    - 0 <= c0 < 4
    - 0 <= m0 < 8
    - 0 <= r0 < 3
    - 0 <= s0 < 3
    renames: {output: T0, input: I0, weight: W0}

  # ── Backbone: YOLOv8-S stem and stage convolutions ────────────────────────

  # T1: stem 3x3 stride-2  640x640x3 -> 320x320x32
  #   MACs = 320*320*3*32*3*3 = 88,473,600
  - einsum: "T1[p1, q1, n, m1] = I1[n, c1, H: p1 * 2 + r1, W: q1 * 2 + s1] * W1[r1, s1, c1, m1]"
    iteration_space_shape:
    - 0 <= p1 < 320
    - 0 <= q1 < 320
    - 0 <= c1 < 3
    - 0 <= m1 < 32
    - 0 <= r1 < 3
    - 0 <= s1 < 3
    renames: {output: T1, input: I1, weight: W1}

  # T2: 3x3 stride-2  320x320x32 -> 160x160x64
  #   MACs = 160*160*32*64*3*3 = 471,859,200
  - einsum: "T2[p2, q2, n, m2] = I2[n, c2, H: p2 * 2 + r2, W: q2 * 2 + s2] * W2[r2, s2, c2, m2]"
    iteration_space_shape:
    - 0 <= p2 < 160
    - 0 <= q2 < 160
    - 0 <= c2 < 32
    - 0 <= m2 < 64
    - 0 <= r2 < 3
    - 0 <= s2 < 3
    renames: {output: T2, input: I2, weight: W2}

  # T3: C2f_1 inner bottleneck 3x3 (n=1)  160x160x32 -> 160x160x32
  #   MACs = 160*160*32*32*3*3 = 235,929,600
  - einsum: "T3[p3, q3, n, m3] = I3[n, c3, H: p3 + r3, W: q3 + s3] * W3[r3, s3, c3, m3]"
    iteration_space_shape:
    - 0 <= p3 < 160
    - 0 <= q3 < 160
    - 0 <= c3 < 32
    - 0 <= m3 < 32
    - 0 <= r3 < 3
    - 0 <= s3 < 3
    renames: {output: T3, input: I3, weight: W3}

  # T4: 3x3 stride-2  160x160x64 -> 80x80x128
  #   MACs = 80*80*64*128*3*3 = 471,859,200
  - einsum: "T4[p4, q4, n, m4] = I4[n, c4, H: p4 * 2 + r4, W: q4 * 2 + s4] * W4[r4, s4, c4, m4]"
    iteration_space_shape:
    - 0 <= p4 < 80
    - 0 <= q4 < 80
    - 0 <= c4 < 64
    - 0 <= m4 < 128
    - 0 <= r4 < 3
    - 0 <= s4 < 3
    renames: {output: T4, input: I4, weight: W4}

  # T5: C2f_2 inner bottleneck 3x3 (pass a)  80x80x64 -> 80x80x64
  #   MACs = 80*80*64*64*3*3 = 235,929,600
  - einsum: "T5[p5, q5, n, m5] = I5[n, c5, H: p5 + r5, W: q5 + s5] * W5[r5, s5, c5, m5]"
    iteration_space_shape:
    - 0 <= p5 < 80
    - 0 <= q5 < 80
    - 0 <= c5 < 64
    - 0 <= m5 < 64
    - 0 <= r5 < 3
    - 0 <= s5 < 3
    renames: {output: T5, input: I5, weight: W5}

  # T6: C2f_2 inner bottleneck 3x3 (pass b)  80x80x64 -> 80x80x64
  #   MACs = 80*80*64*64*3*3 = 235,929,600
  - einsum: "T6[p6, q6, n, m6] = I6[n, c6, H: p6 + r6, W: q6 + s6] * W6[r6, s6, c6, m6]"
    iteration_space_shape:
    - 0 <= p6 < 80
    - 0 <= q6 < 80
    - 0 <= c6 < 64
    - 0 <= m6 < 64
    - 0 <= r6 < 3
    - 0 <= s6 < 3
    renames: {output: T6, input: I6, weight: W6}

  # T7: 3x3 stride-2  80x80x128 -> 40x40x256
  #   MACs = 40*40*128*256*3*3 = 471,859,200
  - einsum: "T7[p7, q7, n, m7] = I7[n, c7, H: p7 * 2 + r7, W: q7 * 2 + s7] * W7[r7, s7, c7, m7]"
    iteration_space_shape:
    - 0 <= p7 < 40
    - 0 <= q7 < 40
    - 0 <= c7 < 128
    - 0 <= m7 < 256
    - 0 <= r7 < 3
    - 0 <= s7 < 3
    renames: {output: T7, input: I7, weight: W7}

  # T8: C2f_3 inner bottleneck 3x3 (pass a)  40x40x128 -> 40x40x128
  #   MACs = 40*40*128*128*3*3 = 235,929,600
  - einsum: "T8[p8, q8, n, m8] = I8[n, c8, H: p8 + r8, W: q8 + s8] * W8[r8, s8, c8, m8]"
    iteration_space_shape:
    - 0 <= p8 < 40
    - 0 <= q8 < 40
    - 0 <= c8 < 128
    - 0 <= m8 < 128
    - 0 <= r8 < 3
    - 0 <= s8 < 3
    renames: {output: T8, input: I8, weight: W8}

  # T9: C2f_3 inner bottleneck 3x3 (pass b)  40x40x128 -> 40x40x128
  #   MACs = 40*40*128*128*3*3 = 235,929,600
  - einsum: "T9[p9, q9, n, m9] = I9[n, c9, H: p9 + r9, W: q9 + s9] * W9[r9, s9, c9, m9]"
    iteration_space_shape:
    - 0 <= p9 < 40
    - 0 <= q9 < 40
    - 0 <= c9 < 128
    - 0 <= m9 < 128
    - 0 <= r9 < 3
    - 0 <= s9 < 3
    renames: {output: T9, input: I9, weight: W9}

  # T10: 3x3 stride-2  40x40x256 -> 20x20x512
  #   MACs = 20*20*256*512*3*3 = 471,859,200
  - einsum: "T10[p10, q10, n, m10] = I10[n, c10, H: p10 * 2 + r10, W: q10 * 2 + s10] * W10[r10, s10, c10, m10]"
    iteration_space_shape:
    - 0 <= p10 < 20
    - 0 <= q10 < 20
    - 0 <= c10 < 256
    - 0 <= m10 < 512
    - 0 <= r10 < 3
    - 0 <= s10 < 3
    renames: {output: T10, input: I10, weight: W10}

  # T11: C2f_4 inner bottleneck 3x3 (n=1)  20x20x256 -> 20x20x256
  #   MACs = 20*20*256*256*3*3 = 235,929,600
  - einsum: "T11[p11, q11, n, m11] = I11[n, c11, H: p11 + r11, W: q11 + s11] * W11[r11, s11, c11, m11]"
    iteration_space_shape:
    - 0 <= p11 < 20
    - 0 <= q11 < 20
    - 0 <= c11 < 256
    - 0 <= m11 < 256
    - 0 <= r11 < 3
    - 0 <= s11 < 3
    renames: {output: T11, input: I11, weight: W11}

  # T12: SPPF 1x1 channel reduction  20x20x512 -> 20x20x256
  #   MACs = 20*20*512*256 = 52,428,800
  - einsum: "T12[p12, q12, n, m12] = I12[n, c12, p12, q12] * W12[c12, m12]"
    iteration_space_shape:
    - 0 <= p12 < 20
    - 0 <= q12 < 20
    - 0 <= c12 < 512
    - 0 <= m12 < 256
    renames: {output: T12, input: I12, weight: W12}

  # ── CLIP text encoder (one transformer layer, 77 tokens, d=512) ───────────

  # T13: Q projection  (77, 512) -> (77, 512)
  #   MACs = 77*512*512 = 20,185,088
  - einsum: "T13[p13, n, m13] = I13[n, c13, p13] * W13[c13, m13]"
    iteration_space_shape:
    - 0 <= p13 < 77
    - 0 <= c13 < 512
    - 0 <= m13 < 512
    renames: {output: T13, input: I13, weight: W13}

  # T14: K projection  (77, 512) -> (77, 512)
  #   MACs = 77*512*512 = 20,185,088
  - einsum: "T14[p14, n, m14] = I14[n, c14, p14] * W14[c14, m14]"
    iteration_space_shape:
    - 0 <= p14 < 77
    - 0 <= c14 < 512
    - 0 <= m14 < 512
    renames: {output: T14, input: I14, weight: W14}

  # T15: V projection  (77, 512) -> (77, 512)
  #   MACs = 77*512*512 = 20,185,088
  - einsum: "T15[p15, n, m15] = I15[n, c15, p15] * W15[c15, m15]"
    iteration_space_shape:
    - 0 <= p15 < 77
    - 0 <= c15 < 512
    - 0 <= m15 < 512
    renames: {output: T15, input: I15, weight: W15}

  # T16: FFN up  (77, 512) -> (77, 2048)
  #   MACs = 77*512*2048 = 80,740,352
  - einsum: "T16[p16, n, m16] = I16[n, c16, p16] * W16[c16, m16]"
    iteration_space_shape:
    - 0 <= p16 < 77
    - 0 <= c16 < 512
    - 0 <= m16 < 2048
    renames: {output: T16, input: I16, weight: W16}

  # T17: FFN down  (77, 2048) -> (77, 512)
  #   MACs = 77*2048*512 = 80,740,352
  - einsum: "T17[p17, n, m17] = I17[n, c17, p17] * W17[c17, m17]"
    iteration_space_shape:
    - 0 <= p17 < 77
    - 0 <= c17 < 2048
    - 0 <= m17 < 512
    renames: {output: T17, input: I17, weight: W17}

  # ── RepVL-PAN cross-modal fusion ──────────────────────────────────────────

  # T18: 1x1 image-text projection at P5 scale  20x20x512 -> 20x20x512
  #   MACs = 20*20*512*512 = 104,857,600
  - einsum: "T18[p18, q18, n, m18] = I18[n, c18, p18, q18] * W18[c18, m18]"
    iteration_space_shape:
    - 0 <= p18 < 20
    - 0 <= q18 < 20
    - 0 <= c18 < 512
    - 0 <= m18 < 512
    renames: {output: T18, input: I18, weight: W18}

  # ── Detection head ────────────────────────────────────────────────────────

  # T19: head 3x3 conv P3  80x80x128 -> 80x80x128
  #   MACs = 80*80*128*128*3*3 = 943,718,400
  - einsum: "T19[p19, q19, n, m19] = I19[n, c19, H: p19 + r19, W: q19 + s19] * W19[r19, s19, c19, m19]"
    iteration_space_shape:
    - 0 <= p19 < 80
    - 0 <= q19 < 80
    - 0 <= c19 < 128
    - 0 <= m19 < 128
    - 0 <= r19 < 3
    - 0 <= s19 < 3
    renames: {output: T19, input: I19, weight: W19}

  # T20: head 3x3 conv P4  40x40x256 -> 40x40x256
  #   MACs = 40*40*256*256*3*3 = 943,718,400
  - einsum: "T20[p20, q20, n, m20] = I20[n, c20, H: p20 + r20, W: q20 + s20] * W20[r20, s20, c20, m20]"
    iteration_space_shape:
    - 0 <= p20 < 40
    - 0 <= q20 < 40
    - 0 <= c20 < 256
    - 0 <= m20 < 256
    - 0 <= r20 < 3
    - 0 <= s20 < 3
    renames: {output: T20, input: I20, weight: W20}