# YOLO-World-S  320×320 input  (spatial dims halved from yolo_world.yaml)
# Text encoder layers T13-T17 are unchanged.

renames:
  einsums:
  - name: default
    tensor_accesses:
    - expected_count: 1
      name: input
      source: Inputs & Intermediates
    - expected_count: 1
      name: output
      source: Outputs
    - expected_count: 1
      name: weight
      source: ~(input | output)
workload:
  bits_per_value:
    All: 8
  einsums:
  - einsum: 'T0[p0, q0, n, m0] = I0[n, c0, H: p0 + r0, W: q0 + s0] * W0[r0, s0, c0,
      m0]'
    iteration_space_shape:
    - 0 <= p0 < 4
    - 0 <= q0 < 4
    - 0 <= c0 < 4
    - 0 <= m0 < 8
    - 0 <= r0 < 3
    - 0 <= s0 < 3
    renames:
      input: I0
      output: T0
      weight: W0
  - einsum: 'T1[p1, q1, n, m1] = I1[n, c1, H: p1 * 2 + r1, W: q1 * 2 + s1] * W1[r1,
      s1, c1, m1]'
    iteration_space_shape:
    - 0 <= p1 < 160
    - 0 <= q1 < 160
    - 0 <= c1 < 3
    - 0 <= m1 < 32
    - 0 <= r1 < 3
    - 0 <= s1 < 3
    renames:
      input: I1
      output: T1
      weight: W1
  - einsum: 'T2[p2, q2, n, m2] = I2[n, c2, H: p2 * 2 + r2, W: q2 * 2 + s2] * W2[r2,
      s2, c2, m2]'
    iteration_space_shape:
    - 0 <= p2 < 80
    - 0 <= q2 < 80
    - 0 <= c2 < 32
    - 0 <= m2 < 64
    - 0 <= r2 < 3
    - 0 <= s2 < 3
    renames:
      input: I2
      output: T2
      weight: W2
  - einsum: 'T3[p3, q3, n, m3] = I3[n, c3, H: p3 + r3, W: q3 + s3] * W3[r3, s3, c3,
      m3]'
    iteration_space_shape:
    - 0 <= p3 < 80
    - 0 <= q3 < 80
    - 0 <= c3 < 32
    - 0 <= m3 < 32
    - 0 <= r3 < 3
    - 0 <= s3 < 3
    renames:
      input: I3
      output: T3
      weight: W3
  - einsum: 'T4[p4, q4, n, m4] = I4[n, c4, H: p4 * 2 + r4, W: q4 * 2 + s4] * W4[r4,
      s4, c4, m4]'
    iteration_space_shape:
    - 0 <= p4 < 40
    - 0 <= q4 < 40
    - 0 <= c4 < 64
    - 0 <= m4 < 128
    - 0 <= r4 < 3
    - 0 <= s4 < 3
    renames:
      input: I4
      output: T4
      weight: W4
  - einsum: 'T5[p5, q5, n, m5] = I5[n, c5, H: p5 + r5, W: q5 + s5] * W5[r5, s5, c5,
      m5]'
    iteration_space_shape:
    - 0 <= p5 < 40
    - 0 <= q5 < 40
    - 0 <= c5 < 64
    - 0 <= m5 < 64
    - 0 <= r5 < 3
    - 0 <= s5 < 3
    renames:
      input: I5
      output: T5
      weight: W5
  - einsum: 'T6[p6, q6, n, m6] = I6[n, c6, H: p6 + r6, W: q6 + s6] * W6[r6, s6, c6,
      m6]'
    iteration_space_shape:
    - 0 <= p6 < 40
    - 0 <= q6 < 40
    - 0 <= c6 < 64
    - 0 <= m6 < 64
    - 0 <= r6 < 3
    - 0 <= s6 < 3
    renames:
      input: I6
      output: T6
      weight: W6
  - einsum: 'T7[p7, q7, n, m7] = I7[n, c7, H: p7 * 2 + r7, W: q7 * 2 + s7] * W7[r7,
      s7, c7, m7]'
    iteration_space_shape:
    - 0 <= p7 < 20
    - 0 <= q7 < 20
    - 0 <= c7 < 128
    - 0 <= m7 < 256
    - 0 <= r7 < 3
    - 0 <= s7 < 3
    renames:
      input: I7
      output: T7
      weight: W7
  - einsum: 'T8[p8, q8, n, m8] = I8[n, c8, H: p8 + r8, W: q8 + s8] * W8[r8, s8, c8,
      m8]'
    iteration_space_shape:
    - 0 <= p8 < 20
    - 0 <= q8 < 20
    - 0 <= c8 < 128
    - 0 <= m8 < 128
    - 0 <= r8 < 3
    - 0 <= s8 < 3
    renames:
      input: I8
      output: T8
      weight: W8
  - einsum: 'T9[p9, q9, n, m9] = I9[n, c9, H: p9 + r9, W: q9 + s9] * W9[r9, s9, c9,
      m9]'
    iteration_space_shape:
    - 0 <= p9 < 20
    - 0 <= q9 < 20
    - 0 <= c9 < 128
    - 0 <= m9 < 128
    - 0 <= r9 < 3
    - 0 <= s9 < 3
    renames:
      input: I9
      output: T9
      weight: W9
  - einsum: 'T10[p10, q10, n, m10] = I10[n, c10, H: p10 * 2 + r10, W: q10 * 2 + s10]
      * W10[r10, s10, c10, m10]'
    iteration_space_shape:
    - 0 <= p10 < 10
    - 0 <= q10 < 10
    - 0 <= c10 < 256
    - 0 <= m10 < 512
    - 0 <= r10 < 3
    - 0 <= s10 < 3
    renames:
      input: I10
      output: T10
      weight: W10
  - einsum: 'T11[p11, q11, n, m11] = I11[n, c11, H: p11 + r11, W: q11 + s11] * W11[r11,
      s11, c11, m11]'
    iteration_space_shape:
    - 0 <= p11 < 10
    - 0 <= q11 < 10
    - 0 <= c11 < 256
    - 0 <= m11 < 256
    - 0 <= r11 < 3
    - 0 <= s11 < 3
    renames:
      input: I11
      output: T11
      weight: W11
  - einsum: T12[p12, q12, n, m12] = I12[n, c12, p12, q12] * W12[c12, m12]
    iteration_space_shape:
    - 0 <= p12 < 10
    - 0 <= q12 < 10
    - 0 <= c12 < 512
    - 0 <= m12 < 256
    renames:
      input: I12
      output: T12
      weight: W12
  - einsum: T13[p13, n, m13] = I13[n, c13, p13] * W13[c13, m13]
    iteration_space_shape:
    - 0 <= p13 < 77
    - 0 <= c13 < 512
    - 0 <= m13 < 512
    renames:
      input: I13
      output: T13
      weight: W13
  - einsum: T14[p14, n, m14] = I14[n, c14, p14] * W14[c14, m14]
    iteration_space_shape:
    - 0 <= p14 < 77
    - 0 <= c14 < 512
    - 0 <= m14 < 512
    renames:
      input: I14
      output: T14
      weight: W14
  - einsum: T15[p15, n, m15] = I15[n, c15, p15] * W15[c15, m15]
    iteration_space_shape:
    - 0 <= p15 < 77
    - 0 <= c15 < 512
    - 0 <= m15 < 512
    renames:
      input: I15
      output: T15
      weight: W15
  - einsum: T16[p16, n, m16] = I16[n, c16, p16] * W16[c16, m16]
    iteration_space_shape:
    - 0 <= p16 < 77
    - 0 <= c16 < 512
    - 0 <= m16 < 2048
    renames:
      input: I16
      output: T16
      weight: W16
  - einsum: T17[p17, n, m17] = I17[n, c17, p17] * W17[c17, m17]
    iteration_space_shape:
    - 0 <= p17 < 77
    - 0 <= c17 < 2048
    - 0 <= m17 < 512
    renames:
      input: I17
      output: T17
      weight: W17
  - einsum: T18[p18, q18, n, m18] = I18[n, c18, p18, q18] * W18[c18, m18]
    iteration_space_shape:
    - 0 <= p18 < 10
    - 0 <= q18 < 10
    - 0 <= c18 < 512
    - 0 <= m18 < 512
    renames:
      input: I18
      output: T18
      weight: W18
  - einsum: 'T19[p19, q19, n, m19] = I19[n, c19, H: p19 + r19, W: q19 + s19] * W19[r19,
      s19, c19, m19]'
    iteration_space_shape:
    - 0 <= p19 < 40
    - 0 <= q19 < 40
    - 0 <= c19 < 128
    - 0 <= m19 < 128
    - 0 <= r19 < 3
    - 0 <= s19 < 3
    renames:
      input: I19
      output: T19
      weight: W19
  - einsum: 'T20[p20, q20, n, m20] = I20[n, c20, H: p20 + r20, W: q20 + s20] * W20[r20,
      s20, c20, m20]'
    iteration_space_shape:
    - 0 <= p20 < 20
    - 0 <= q20 < 20
    - 0 <= c20 < 256
    - 0 <= m20 < 256
    - 0 <= r20 < 3
    - 0 <= s20 < 3
    renames:
      input: I20
      output: T20
      weight: W20
  rank_sizes:
    N: '{{BATCH_SIZE}}'
